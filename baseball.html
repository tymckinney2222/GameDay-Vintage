<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>THE DUGOUT — Player Research</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080e;
  --bg2:#0c0c16;
  --bg3:#111120;
  --card:rgba(255,255,255,0.03);
  --card2:rgba(255,255,255,0.055);
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#fff;
  --text2:rgba(255,255,255,0.65);
  --text3:rgba(255,255,255,0.38);
  --text4:rgba(255,255,255,0.18);
  --red:#e63946;
  --green:#2dc653;
  --amber:#f4a261;
  --blue:#4895ef;
  --cyan:#48cae4;
  --purple:#9b72cf;
  --accent:#e63946;
}
html{overscroll-behavior-y:contain}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HEADER ── */
.app-header{
  position:sticky;top:0;z-index:100;
  background:rgba(8,8,14,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:14px 16px 12px;
}
.app-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:900;letter-spacing:3px;
  text-transform:uppercase;
  background:linear-gradient(90deg,#fff 0%,rgba(255,255,255,0.5) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.app-sub{font-size:10px;color:var(--text3);letter-spacing:2px;margin-top:1px;font-family:'Barlow Condensed',sans-serif;font-weight:600}

/* ── SEARCH ── */
.search-wrap{padding:14px 16px 10px;position:relative}
.search-input{
  width:100%;background:var(--card2);
  border:1px solid var(--border2);
  border-radius:12px;padding:12px 48px 12px 16px;
  color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;
  outline:none;transition:border-color 0.2s;
}
.search-input:focus{border-color:rgba(255,255,255,0.25)}
.search-input::placeholder{color:var(--text3)}
.search-btn{
  position:absolute;right:24px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;
  padding:4px;
}
.search-results{
  position:absolute;top:100%;left:16px;right:16px;z-index:50;
  background:#13131f;border:1px solid var(--border2);border-radius:10px;
  overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,0.6);
  display:none;
}
.search-results.open{display:block}
.search-result-item{
  padding:11px 14px;border-bottom:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:background 0.1s;
}
.search-result-item:last-child{border-bottom:none}
.search-result-item:active{background:var(--card2)}
.sr-photo{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--card2)}
.sr-name{font-size:13px;font-weight:700;color:var(--text)}
.sr-meta{font-size:10px;color:var(--text3);margin-top:1px}
.sr-pos{
  margin-left:auto;font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1px;
  color:var(--text3);background:var(--card2);
  padding:2px 7px;border-radius:4px;
}

/* ── EMPTY STATE ── */
.empty-state{
  padding:60px 24px;text-align:center;
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.empty-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:2px;color:var(--text2);text-transform:uppercase}
.empty-sub{font-size:12px;color:var(--text3);margin-top:8px;line-height:1.6}

/* ── PLAYER CARD ── */
#playerView{display:none;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.player-hero{
  position:relative;overflow:hidden;
  padding:20px 16px 16px;
  background:linear-gradient(180deg,var(--bg3) 0%,var(--bg) 100%);
  border-bottom:1px solid var(--border);
}
.player-hero-bg{
  position:absolute;inset:0;opacity:0.06;
  background-size:cover;background-position:center top;
  filter:blur(20px);
}
.player-hero-content{position:relative;z-index:1;display:flex;gap:14px;align-items:flex-start}
.player-photo-wrap{position:relative;flex-shrink:0}
.player-photo{
  width:80px;height:80px;border-radius:12px;
  object-fit:cover;background:var(--card2);
  border:2px solid var(--border2);
}
.player-pos-badge{
  position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10px;
  letter-spacing:1.5px;padding:2px 8px;border-radius:4px;
  background:var(--accent);color:#fff;white-space:nowrap;
}
.player-info{flex:1;min-width:0;padding-top:2px}
.player-name{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;
  line-height:1;color:#fff;letter-spacing:0.5px;
}
.player-team-line{
  display:flex;align-items:center;gap:8px;margin-top:6px;
}
.player-team-logo{width:22px;height:22px;object-fit:contain}
.player-team-name{font-size:12px;color:var(--text2);font-weight:600}
.player-bats-throws{font-size:10px;color:var(--text3);margin-top:4px;font-family:'Share Tech Mono',monospace}
.player-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.player-tag{
  font-size:10px;font-weight:700;letter-spacing:0.5px;
  padding:3px 8px;border-radius:5px;font-family:'Barlow Condensed',sans-serif;
}
.tag-age{background:rgba(72,149,239,0.15);color:#4895ef}
.tag-status-active{background:rgba(45,198,83,0.15);color:#2dc653}
.tag-status-il{background:rgba(230,57,70,0.15);color:#e63946}
.tag-hand{background:rgba(255,255,255,0.07);color:var(--text2)}
.tag-number{background:rgba(255,255,255,0.07);color:var(--text2)}

/* Quick season line */
.quick-stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  margin:0;
}
.qs-cell{
  background:var(--bg);padding:10px 4px;text-align:center;
}
.qs-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:#fff}
.qs-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:1px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase}

/* ── TABS ── */
.tab-bar{
  display:flex;overflow-x:auto;
  border-bottom:1px solid var(--border);
  background:var(--bg);position:sticky;top:66px;z-index:90;
  scrollbar-width:none;
}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;padding:12px 16px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text3);background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.15s;
  white-space:nowrap;
}
.tab-btn.active{color:#fff;border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:var(--text2)}

/* ── TAB PANELS ── */
.tab-panel{display:none;padding:16px 16px 100px}
.tab-panel.active{display:block;animation:fadeUp 0.2s ease}

/* Section headers */
.section-hdr{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--text3);margin:20px 0 10px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.section-hdr:first-child{margin-top:0}

/* Stat grid cards */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.stat-grid-4{grid-template-columns:repeat(4,1fr)}
.stat-grid-2{grid-template-columns:repeat(2,1fr)}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 8px;text-align:center;
}
.sc-val{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:22px;color:#fff;line-height:1;
}
.sc-val.elite{color:var(--green)}
.sc-val.good{color:#90e0a0}
.sc-val.avg{color:var(--text2)}
.sc-val.poor{color:var(--amber)}
.sc-val.bad{color:var(--red)}
.sc-lbl{
  font-size:9px;color:var(--text3);margin-top:4px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
}
.sc-sub{font-size:9px;color:var(--text4);margin-top:1px;font-family:'Share Tech Mono',monospace}

/* Year-by-year table */
.stats-table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.stats-table{width:100%;border-collapse:collapse;font-size:11px;min-width:500px}
.stats-table thead th{
  background:var(--bg3);padding:8px 6px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:10px;letter-spacing:1px;color:var(--text3);
  text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;
}
.stats-table thead th:first-child,.stats-table tbody td:first-child{text-align:left;padding-left:10px}
.stats-table tbody td{
  padding:8px 6px;text-align:center;color:var(--text2);
  border-bottom:1px solid rgba(255,255,255,0.03);
  font-family:'Share Tech Mono',monospace;font-size:11px;
}
.stats-table tbody tr:last-child td{border-bottom:none}
.stats-table tbody tr:hover td{background:var(--card2)}
.stats-table .yr-col{color:var(--text3);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px}
.stats-table .team-col{color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-weight:700}
.stats-table .highlight{color:#fff;font-weight:700}
.stats-table .total-row td{background:rgba(255,255,255,0.04);color:#fff;font-weight:700;border-top:1px solid var(--border2)}

/* Percentile bars */
.pct-row{margin-bottom:10px}
.pct-label-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.pct-name{font-size:11px;color:var(--text2);font-weight:600}
.pct-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px}
.pct-track{height:6px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.pct-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}
.pct-elite{background:linear-gradient(90deg,#2dc653,#4ade80)}
.pct-good{background:linear-gradient(90deg,#16a34a,#2dc653)}
.pct-avg{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.pct-poor{background:linear-gradient(90deg,#d97706,#f4a261)}
.pct-bad{background:linear-gradient(90deg,#dc2626,#e63946)}

/* Pitch arsenal */
.arsenal-grid{display:flex;flex-direction:column;gap:8px}
.arsenal-pitch{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;
}
.ap-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ap-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:0.5px}
.ap-usage{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3)}
.ap-usage-bar{height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;margin-bottom:10px}
.ap-usage-fill{height:100%;border-radius:2px}
.ap-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ap-stat{text-align:center}
.ap-stat-val{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;color:#fff}
.ap-stat-lbl{font-size:8px;color:var(--text3);letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;margin-top:1px}

/* Game log */
.gamelog-table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.gamelog-table{width:100%;border-collapse:collapse;min-width:420px}
.gamelog-table thead th{
  background:var(--bg3);padding:7px 5px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:9px;letter-spacing:1.5px;color:var(--text3);
  text-align:center;border-bottom:1px solid var(--border);
}
.gamelog-table thead th:first-child,.gamelog-table tbody td:first-child{text-align:left;padding-left:10px}
.gamelog-table tbody td{
  padding:7px 5px;text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.03);
  font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text2);
}
.gamelog-table tbody tr:last-child td{border-bottom:none}
.gamelog-table tbody tr:hover td{background:var(--card2)}
.gl-date{color:var(--text3);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px}
.gl-opp{color:var(--text2);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px}
.gl-good{color:var(--green)}
.gl-bad{color:var(--red)}
.gl-avg{color:var(--text2)}
.gl-result-w{color:var(--green);font-weight:700;font-family:'Barlow Condensed',sans-serif}
.gl-result-l{color:var(--red);font-weight:700;font-family:'Barlow Condensed',sans-serif}

/* Splits */
.splits-section{margin-bottom:20px}
.splits-table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
.splits-table{width:100%;border-collapse:collapse;min-width:360px}
.splits-table thead th{
  background:var(--bg3);padding:7px 6px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:9px;letter-spacing:1.5px;color:var(--text3);
  text-align:center;border-bottom:1px solid var(--border);
}
.splits-table thead th:first-child,.splits-table tbody td:first-child{text-align:left;padding-left:10px;min-width:80px}
.splits-table tbody td{
  padding:8px 6px;text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.03);
  font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);
}
.splits-table tbody tr:last-child td{border-bottom:none}
.splits-table .split-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:#fff}

/* Bio */
.bio-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bio-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.bio-label{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.bio-value{font-size:14px;font-weight:700;color:#fff;margin-top:3px;font-family:'Barlow Condensed',sans-serif}

/* Statcast ring indicators */
.sc-ring-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}

/* Loading */
.tab-loading{
  padding:40px 16px;text-align:center;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;
  letter-spacing:2px;color:var(--text3);text-transform:uppercase;
}
.loading-dot{display:inline-block;animation:ldot 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:0.2s}
.loading-dot:nth-child(3){animation-delay:0.4s}
@keyframes ldot{0%,80%,100%{opacity:0.2}40%{opacity:1}}

/* Injury banner */
.injury-banner{
  background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.3);
  border-radius:8px;padding:8px 12px;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:#fca5a5;
}

/* Comparison bar (better/worse) */
.comp-bar{
  height:4px;border-radius:2px;background:rgba(255,255,255,0.07);
  overflow:hidden;margin-top:4px;
}
.comp-fill-pos{background:var(--green);height:100%;border-radius:2px}
.comp-fill-neg{background:var(--red);height:100%;border-radius:2px}

/* War card */
.war-display{
  background:linear-gradient(135deg,rgba(155,114,207,0.12),rgba(72,149,239,0.08));
  border:1px solid rgba(155,114,207,0.25);
  border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;
}
.war-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:40px;color:#fff}
.war-label{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:2px;color:var(--purple);text-transform:uppercase}
.war-desc{font-size:10px;color:var(--text3);margin-top:3px;max-width:160px}
.war-rank{text-align:right}
.war-rank-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--purple)}
.war-rank-lbl{font-size:9px;color:var(--text3);letter-spacing:1px;font-family:'Barlow Condensed',sans-serif}

/* Streak indicator */
.streak-wrap{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
.streak-day{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;
}
.streak-hot{background:rgba(45,198,83,0.2);color:#2dc653;border:1px solid rgba(45,198,83,0.3)}
.streak-cold{background:rgba(230,57,70,0.15);color:#e63946;border:1px solid rgba(230,57,70,0.25)}
.streak-avg{background:var(--card);color:var(--text3);border:1px solid var(--border)}
.streak-dnp{background:transparent;color:var(--text4);border:1px solid rgba(255,255,255,0.05)}

/* Scroll hint on tables */
.scroll-hint{
  font-size:9px;color:var(--text4);text-align:right;
  margin-bottom:4px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;
}

/* No data */
.no-data{
  padding:24px;text-align:center;color:var(--text3);
  font-size:11px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;
  text-transform:uppercase;
}

/* Pitcher/Batter toggle on overview */
.type-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:10px;
  letter-spacing:1.5px;padding:4px 10px;border-radius:6px;margin-bottom:12px;
}
.type-badge.batter{background:rgba(72,202,228,0.12);color:var(--cyan);border:1px solid rgba(72,202,228,0.2)}
.type-badge.pitcher{background:rgba(230,57,70,0.12);color:var(--red);border:1px solid rgba(230,57,70,0.2)}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">The Dugout</div>
  <div class="app-sub">⚾ Player Research · Powered by Statcast + MLB API</div>
</div>

<div class="search-wrap" style="position:relative">
  <input class="search-input" id="searchInput" type="text" placeholder="Search player name..." autocomplete="off" autocorrect="off" spellcheck="false">
  <button class="search-btn" onclick="doSearch()">🔍</button>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- Empty state -->
<div class="empty-state" id="emptyState">
  <div class="empty-icon">⚾</div>
  <div class="empty-title">Find Any Player</div>
  <div class="empty-sub">Search by name to pull up a full scouting report — stats, Statcast, splits, game log, pitch arsenal and more.</div>
</div>

<!-- Player view -->
<div id="playerView">

  <!-- Hero -->
  <div class="player-hero" id="playerHero">
    <div class="player-hero-bg" id="heroBg"></div>
    <div class="player-hero-content">
      <div class="player-photo-wrap">
        <img class="player-photo" id="playerPhoto" src="" alt="">
        <div class="player-pos-badge" id="playerPosBadge">SP</div>
      </div>
      <div class="player-info">
        <div class="player-name" id="playerName">—</div>
        <div class="player-team-line">
          <img class="player-team-logo" id="playerTeamLogo" src="" alt="">
          <span class="player-team-name" id="playerTeamName">—</span>
        </div>
        <div class="player-tags" id="playerTags"></div>
      </div>
    </div>
  </div>

  <!-- Quick stats strip -->
  <div class="quick-stats" id="quickStats"></div>

  <!-- Tabs -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- Tab panels -->
  <div id="tabPanels"></div>

</div>

<script>
// ═══════════════════════════════════════
// CONFIG — swap these for your Worker URL
// ═══════════════════════════════════════
var WORKER_URL = 'https://baseball-proxy.tymckinney2222.workers.dev';
var USE_MOCK = false; // flip to true to use mock data for UI testing

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
var currentPlayer = null;
var activeTab = null;
var searchTimer = null;

// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  var q = this.value.trim();
  if (q.length < 2) { closeSearch(); return; }
  searchTimer = setTimeout(function() { doSearch(q); }, 300);
});

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { doSearch(this.value.trim()); }
  if (e.key === 'Escape') { closeSearch(); }
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) closeSearch();
});

function closeSearch() {
  document.getElementById('searchResults').classList.remove('open');
}

async function doSearch(q) {
  q = q || document.getElementById('searchInput').value.trim();
  if (!q || q.length < 2) return;

  var el = document.getElementById('searchResults');
  el.innerHTML = '<div style="padding:12px 14px;font-size:11px;color:rgba(255,255,255,0.3);font-family:Barlow Condensed,sans-serif;letter-spacing:1px">Searching...</div>';
  el.classList.add('open');

  try {
    var results = await searchPlayers(q);
    if (!results.length) {
      el.innerHTML = '<div style="padding:12px 14px;font-size:11px;color:rgba(255,255,255,0.3);font-family:Barlow Condensed,sans-serif;letter-spacing:1px">No players found</div>';
      return;
    }
    el.innerHTML = results.slice(0, 8).map(function(p) {
      return '<div class="search-result-item" onclick="selectPlayer(' + JSON.stringify(p).replace(/"/g,"'") + ')">' +
        '<img class="sr-photo" src="' + (p.photo || '') + '" onerror="this.style.background=\'rgba(255,255,255,0.05)\';this.src=\'\'">' +
        '<div><div class="sr-name">' + p.fullName + '</div>' +
        '<div class="sr-meta">' + (p.team || 'Free Agent') + ' · ' + (p.position || '') + '</div></div>' +
        '<div class="sr-pos">' + (p.position || '—') + '</div>' +
        '</div>';
    }).join('');
  } catch(e) {
    console.error('doSearch error:', e);
    el.innerHTML = '<div style="padding:12px 14px;font-size:11px;color:#e63946;font-family:Barlow Condensed,sans-serif">Search failed: ' + (e.message || 'unknown error') + '</div>';
  }
}

async function searchPlayers(q) {
  if (USE_MOCK) return mockSearch(q);
  try {
    var res = await fetch(WORKER_URL + '/search?q=' + encodeURIComponent(q));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    // Handle error object from worker
    if (!Array.isArray(data)) {
      console.error('Search returned non-array:', data);
      return [];
    }
    return data;
  } catch(e) {
    console.error('Search error:', e);
    throw e;
  }
}

// ═══════════════════════════════════════
// PLAYER SELECTION
// ═══════════════════════════════════════
async function selectPlayer(p) {
  closeSearch();
  document.getElementById('searchInput').value = p.fullName;
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('playerView').style.display = 'block';
  currentPlayer = p;
  renderPlayerShell(p);
  loadPlayerData(p);
}

function renderPlayerShell(p) {
  document.getElementById('playerName').textContent = p.fullName;
  document.getElementById('playerPosBadge').textContent = p.position || '—';
  document.getElementById('playerTeamName').textContent = p.team || 'Free Agent';
  var photo = document.getElementById('playerPhoto');
  photo.src = p.photo || '';
  photo.onerror = function() { this.style.opacity = '0.3'; };
  var logo = document.getElementById('playerTeamLogo');
  logo.src = p.teamLogo || '';
  document.getElementById('heroBg').style.backgroundImage = 'url(' + (p.photo || '') + ')';

  var isPitcher = isPitcherPos(p.position);
  var tags = document.getElementById('playerTags');
  tags.innerHTML =
    (p.age ? '<span class="player-tag tag-age">Age ' + p.age + '</span>' : '') +
    (p.number ? '<span class="player-tag tag-number">#' + p.number + '</span>' : '') +
    (p.bats ? '<span class="player-tag tag-hand">B: ' + p.bats + '</span>' : '') +
    (p.throws ? '<span class="player-tag tag-hand">T: ' + p.throws + '</span>' : '') +
    (p.status === 'IL' ? '<span class="player-tag tag-status-il">🏥 IL</span>' : '<span class="player-tag tag-status-active">✓ Active</span>');

  // Tabs depend on pitcher vs batter
  renderTabs(isPitcher);

  // Loading states
  document.getElementById('quickStats').innerHTML = '';
  document.getElementById('tabPanels').innerHTML = '';
}

function isPitcherPos(pos) {
  return pos && (pos === 'SP' || pos === 'RP' || pos === 'CP' || pos === 'P');
}

function renderTabs(isPitcher) {
  var tabs = isPitcher
    ? ['Overview','Stats','Statcast','Arsenal','Splits','Game Log','Bio']
    : ['Overview','Stats','Statcast','Splits','Game Log','Bio'];

  var bar = document.getElementById('tabBar');
  bar.innerHTML = tabs.map(function(t, i) {
    return '<button class="tab-btn' + (i===0?' active':'') + '" onclick="switchTab(\'' + t + '\',this)">' + t + '</button>';
  }).join('');

  activeTab = tabs[0];
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  activeTab = name;
  renderTabContent(name);
}

// ═══════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════
async function loadPlayerData(p) {
  try {
    var data = USE_MOCK ? await mockPlayerData(p) : await fetchPlayerData(p);
    renderAllTabs(data, p);
  } catch(e) {
    console.error('Player data error:', e);
  }
}

async function fetchPlayerData(p) {
  var res = await fetch(WORKER_URL + '/player/' + p.id);
  return res.json();
}

var _playerData = null;
function renderAllTabs(data, p) {
  _playerData = data;
  var isPitcher = isPitcherPos(p.position);

  // Update team name/logo from worker data (more accurate than search result)
  if (data.teamName) {
    document.getElementById('playerTeamName').textContent = data.teamName;
  }
  if (data.teamId) {
    document.getElementById('playerTeamLogo').src = 'https://www.mlbstatic.com/team-logos/' + data.teamId + '.svg';
  }

  // Quick stats strip
  var qs = document.getElementById('quickStats');
  if (isPitcher) {
    var ps = data.currentSeason || {};
    qs.innerHTML = makeQS([
      {val: ps.era || '—', lbl: 'ERA'},
      {val: ps.whip || '—', lbl: 'WHIP'},
      {val: ps.k9 || '—', lbl: 'K/9'},
      {val: ps.w + '-' + ps.l || '—', lbl: 'W-L'},
    ]);
  } else {
    var bs = data.currentSeason || {};
    qs.innerHTML = makeQS([
      {val: bs.avg || '.---', lbl: 'AVG'},
      {val: bs.obp || '.---', lbl: 'OBP'},
      {val: bs.slg || '.---', lbl: 'SLG'},
      {val: bs.hr || '—', lbl: 'HR'},
    ]);
  }

  renderTabContent(activeTab || 'Overview');
}

function makeQS(items) {
  return items.map(function(i) {
    return '<div class="qs-cell"><div class="qs-val">' + i.val + '</div><div class="qs-lbl">' + i.lbl + '</div></div>';
  }).join('');
}

function renderTabContent(tab) {
  if (!_playerData) return;
  var el = document.getElementById('tabPanels');
  var isPitcher = isPitcherPos(currentPlayer && currentPlayer.position);

  var html = '<div class="tab-panel active">';
  switch(tab) {
    case 'Overview': html += renderOverview(isPitcher); break;
    case 'Stats': html += renderStats(isPitcher); break;
    case 'Statcast': html += renderStatcast(isPitcher); break;
    case 'Arsenal': html += renderArsenal(); break;
    case 'Splits': html += renderSplits(isPitcher); break;
    case 'Game Log': html += renderGameLog(isPitcher); break;
    case 'Bio': html += renderBio(); break;
    default: html += '<div class="no-data">Coming soon</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

      cols.forEach(function(c) { h += '<td>' + (row[c]||'—') + '</td>'; });
      h += '</tr>';

    return h;

  if (isPitcher) {

      '<th>DATE</th><th>OPP</th><th>AB</th><th>R</th><th>H</th><th>2B</th><th>3B</th><th>HR</th><th>RBI</th><th>BB</th><th>K</th><th>SB</th><th>AVG</th>' +

        '<td class="gl-date">' + g.date + '</td>' +
        '<td class="gl-opp">' + g.opp + '</td>' +
        '<td>' + (g.ab||'0') + '</td>' +

function makeStatCard(val, lbl, unit, tier) {
  var cls = tier ? 'sc-val ' + tier : 'sc-val';
  return '<div class="stat-card">' +
    '<div class="' + cls + '">' + (val != null ? val : '—') + '</div>' +
    '<div class="sc-lbl">' + lbl + '</div>' +
    (unit ? '<div class="sc-sub">' + unit + '</div>' : '') +
    '</div>';
}

function makeBio(label, val) {
  if (!val) return '';
  return '<div class="bio-card"><div class="bio-label">' + label + '</div><div class="bio-value">' + val + '</div></div>';
}

function renderPctBar(name, val, pct) {
  var cls = pct >= 90 ? 'pct-elite' : pct >= 70 ? 'pct-good' : pct >= 40 ? 'pct-avg' : pct >= 20 ? 'pct-poor' : 'pct-bad';
  var valColor = pct >= 90 ? '#4ade80' : pct >= 70 ? '#2dc653' : pct >= 40 ? '#60a5fa' : pct >= 20 ? '#f4a261' : '#e63946';
  return '<div class="pct-row">' +
    '<div class="pct-label-row">' +
      '<span class="pct-name">' + name + '</span>' +
      '<span class="pct-val" style="color:' + valColor + '">' + (val != null ? val : '—') + ' <span style="font-size:10px;opacity:0.6">(p' + pct + ')</span></span>' +
    '</div>' +
    '<div class="pct-track"><div class="pct-fill ' + cls + '" style="width:' + pct + '%"></div></div>' +
  '</div>';
}

function warDescription(war) {
  if (war >= 8) return 'MVP-level season';
  if (war >= 5) return 'All-Star caliber';
  if (war >= 3) return 'Above average starter';
  if (war >= 2) return 'Solid contributor';
  if (war >= 1) return 'Role player';
  if (war >= 0) return 'Replacement level';
  return 'Below replacement';
}
